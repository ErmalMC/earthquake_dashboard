name: CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/earthquake-backend:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          build-args: |
            VITE_API_BASE_URL=/api
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/earthquake-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Simulate CD — rolling restart
        run: |
          echo "CD step: In a production environment, this job would:"
          echo "  1. Configure kubectl with the target cluster kubeconfig"
          echo "  2. Run: kubectl rollout restart deployment/backend -n earthquake"
          echo "  3. Run: kubectl rollout restart deployment/frontend -n earthquake"
          echo "  4. Run: kubectl rollout status deployment/backend -n earthquake"
          echo "  5. Run: kubectl rollout status deployment/frontend -n earthquake"
          echo ""
          echo "For this project, the cluster runs locally on Minikube."
          echo "CD is performed manually with: kubectl rollout restart deployment -n earthquake"
          echo ""
          echo "New images deployed to DockerHub:"
          echo "  - ${{ secrets.DOCKERHUB_USERNAME }}/earthquake-backend:latest"
          echo "  - ${{ secrets.DOCKERHUB_USERNAME }}/earthquake-frontend:latest"