name: CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/earthquake-backend:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          build-args: |
            VITE_API_BASE_URL=/api
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/earthquake-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Trigger Argo CD sync (simulated)
        run: |
          echo "CD step: Argo CD is configured to watch the GitHub repository."
          echo "On every push to master, Argo CD automatically:"
          echo "  1. Detects changes in the k8s/ directory"
          echo "  2. Syncs the earthquake namespace with the latest manifests"
          echo "  3. Performs a rolling restart to pull new images from DockerHub"
          echo ""
          echo "Argo CD Application: earthquake-dashboard"
          echo "Repo: https://github.com/ErmalMC/earthquake_dashboard"
          echo "Path: k8s/"
          echo "Namespace: earthquake"
          echo "Sync Policy: Automatic with Self-Heal and Prune enabled"
          echo ""
          echo "New images available on DockerHub:"
          echo "  - ${{ secrets.DOCKERHUB_USERNAME }}/earthquake-backend:latest"
          echo "  - ${{ secrets.DOCKERHUB_USERNAME }}/earthquake-frontend:latest"