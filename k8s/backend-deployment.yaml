apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: earthquake
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ermalmc/earthquake-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: earthquake-secret
                  key: mongodb-uri
