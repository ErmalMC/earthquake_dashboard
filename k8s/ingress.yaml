apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: earthquake-ingress-api
  namespace: earthquake
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /api/$2
spec:
  ingressClassName: nginx
  rules:
    - host: earthquake.local
      http:
        paths:
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: backend
                port:
                  number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: earthquake-ingress-frontend
  namespace: earthquake
spec:
  ingressClassName: nginx
  rules:
    - host: earthquake.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80